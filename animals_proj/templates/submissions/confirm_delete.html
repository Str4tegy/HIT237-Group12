{% extends 'base.html' %}

{% block title %}Delete submission{% endblock %}

{% block content %}
<section class="card narrow">
  <h2>Delete submission #{{ object.id }}</h2>
  <p>Are you sure you want to delete this submission for {{ object.species }}?</p>
  <form method="post">
    {% csrf_token %}
    <button class="danger" type="submit">Delete</button>
  </form>
</section>
{% endblock %}
