{% extends 'base.html' %}

{% block title %}Review flag{% endblock %}

{% block content %}
<section class="card narrow">
  <h2>Review flag #{{ flag.id }}</h2>
  <p>Submission: <a href="{{ flag.submission.get_absolute_url }}">{{ flag.submission }}</a></p>
  <p>Species: {{ flag.submission.species }}</p>
  <p>Original reason: {{ flag.reason }}</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save moderation decision</button>
  </form>
</section>
{% endblock %}
